services:
  postgres:
    image: postgres:16
    container_name: finance-app-postgres
    environment:
      POSTGRES_DB: finance_app_dev
      POSTGRES_USER: finance_app
      POSTGRES_PASSWORD: finance_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_app -d finance_app_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
