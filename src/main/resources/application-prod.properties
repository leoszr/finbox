spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

auth.jwt.secret=${AUTH_JWT_SECRET}
auth.jwt.issuer=${AUTH_JWT_ISSUER:finance-app}
auth.jwt.access-ttl-seconds=${AUTH_JWT_ACCESS_TTL_SECONDS:900}
auth.jwt.refresh-ttl-seconds=${AUTH_JWT_REFRESH_TTL_SECONDS:2592000}
admin.email=${ADMIN_EMAIL:}
admin.password=${ADMIN_PASSWORD:}
admin.name=${ADMIN_NAME:Admin}

supabase.project-ref=${SUPABASE_PROJECT_REF:}

firebase.project-id=${FIREBASE_PROJECT_ID:}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
firebase.credentials.json=${FIREBASE_CREDENTIALS_JSON:}
